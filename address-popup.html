<!DOCTYPE html>
<html lang="ko">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>주소 검색</title>
      <link rel="stylesheet" href="css/reset.css" />
      <link rel="stylesheet" href="css/common.css" />
      <link rel="stylesheet" href="css/popup.css" />
      <script defer src="js/member.js"></script>
   </head>
   <body>
      <div class="wrap-popup">
         <div class="adress-search">
            <p class="label-text">주소검색</p>
            <div>
               <div class="adress-input">
                  <input type="text" />
                  <div class="join-input-search">
                     <button class="search-button"><img src="img/join-search-icon.png" alt="검색" /></button>
                  </div>
               </div>
               <p class="adress-example">예시 : 도로명(반포대로 58), 건물명(독립기념관), 지번(삼성동 25)</p>
            </div>
         </div>
         <div class="scroll-box">
            <div class="table-scroll">
               <table class="table-adress">
                  <thead>
                     <tr>
                        <td>우편번호</td>
                        <td>도로명주소</td>
                        <td>지번주소</td>
                     </tr>
                  </thead>
                  <tbody></tbody>
               </table>
            </div>
         </div>
      </div>
   </body>
</html>
